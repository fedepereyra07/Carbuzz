<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CARBUZZ — Car Culture Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Libre+Franklin:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --border-light: #2a2a2a;
      --accent: #e8ff00;
      --accent2: #ff3c00;
      --text: #e8e8e8;
      --text-muted: #666666;
      --text-dim: #999999;
      --card-bg: #141414;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NOISE TEXTURE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 1000;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      color: var(--text);
      display: flex;
      align-items: baseline;
      gap: 0.2em;
    }

    .logo span {
      color: var(--accent);
    }

    .header-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: right;
      line-height: 1.6;
    }

    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* FILTER BAR */
    .filter-bar {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-right: 0.5rem;
    }

    .filter-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,255,0,0.04);
    }

    .filter-btn.active {
      background: rgba(232,255,0,0.08);
    }

    /* STATUS BAR */
    .status-bar {
      padding: 0.6rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
    }

    .refresh-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .refresh-btn.loading {
      animation: spin-text 1s linear infinite;
      opacity: 0.5;
      pointer-events: none;
    }

    /* MAIN GRID */
    main {
      padding: 2rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* FEATURED (first item) */
    .featured-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--border-light);
      margin-bottom: 2rem;
      background: var(--card-bg);
      transition: border-color 0.2s;
      animation: fadeUp 0.4s ease both;
      text-decoration: none;
      color: inherit;
    }

    .featured-card:hover {
      border-color: var(--accent);
    }

    .featured-img {
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #1a1a1a;
    }

    .featured-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
      filter: grayscale(20%);
    }

    .featured-card:hover .featured-img img {
      transform: scale(1.03);
      filter: grayscale(0%);
    }

    .featured-body {
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-left: 1px solid var(--border);
    }

    .featured-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .featured-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 1rem;
      flex: 1;
    }

    .featured-excerpt {
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
    }

    .source-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-muted);
    }

    /* GRID */
    .feed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    .feed-card {
      background: var(--card-bg);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: background 0.15s;
      animation: fadeUp 0.4s ease both;
    }

    .feed-card:hover {
      background: #1a1a1a;
    }

    .feed-card:hover .card-img img {
      transform: scale(1.04);
      filter: grayscale(0%);
    }

    .card-img {
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #1a1a1a;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease, filter 0.3s ease;
      filter: grayscale(15%);
    }

    .card-img.no-img {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img.no-img .placeholder-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--border-light);
      letter-spacing: 0.1em;
    }

    .card-body {
      padding: 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .card-source {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem;
      line-height: 1.3;
      color: var(--text);
      flex: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    /* LOADING */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1.5rem;
    }

    .loading-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      letter-spacing: 0.1em;
      color: var(--border-light);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0%, 100% { color: var(--border-light); }
      50% { color: var(--text-muted); }
    }

    .loading-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .loading-bar {
      width: 200px;
      height: 1px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--accent);
      animation: load 1.2s ease infinite;
    }

    @keyframes load {
      to { left: 100%; }
    }

    /* ERROR */
    .error-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent2);
      padding: 1rem 2rem;
      border: 1px solid var(--accent2);
      margin: 2rem;
      opacity: 0.8;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .feed-card:nth-child(1) { animation-delay: 0.05s; }
    .feed-card:nth-child(2) { animation-delay: 0.1s; }
    .feed-card:nth-child(3) { animation-delay: 0.15s; }
    .feed-card:nth-child(4) { animation-delay: 0.2s; }
    .feed-card:nth-child(5) { animation-delay: 0.25s; }
    .feed-card:nth-child(6) { animation-delay: 0.3s; }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
    }

    /* FOOTER */
    footer {
      margin-top: 4rem;
      padding: 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-muted);
    }

    .footer-sources {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-muted);
      text-align: right;
      line-height: 1.8;
    }

    @media (max-width: 768px) {
      .featured-card { grid-template-columns: 1fr; }
      .featured-body { border-left: none; border-top: 1px solid var(--border); padding: 1.5rem; }
      .featured-title { font-size: 1.5rem; }
      main { padding: 1rem; }
      header { padding: 0 1rem; }
      .filter-bar, .status-bar { padding: 0.75rem 1rem; }
      .feed-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">CAR<span>BUZZ</span></div>
  <div class="header-meta">
    <div><span class="live-dot"></span>LIVE FEED</div>
    <div id="last-updated">—</div>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">FUENTE //</span>
  <button class="filter-btn active" data-filter="all">Todas</button>
  <button class="filter-btn" data-filter="Petrolicious">Petrolicious</button>
  <button class="filter-btn" data-filter="StanceWorks">StanceWorks</button>
  <button class="filter-btn" data-filter="DrivingLine">DrivingLine</button>
  <button class="filter-btn" data-filter="Road & Track">Road & Track</button>
  <button class="filter-btn" data-filter="Hooniverse">Hooniverse</button>
  <button class="filter-btn" data-filter="JNC">JNC</button>
</div>

<div class="status-bar">
  <span class="status-text" id="status-text">Cargando feeds...</span>
  <button class="refresh-btn" id="refresh-btn" onclick="loadAllFeeds()">↻ REFRESH</button>
</div>

<main id="main-content">
  <div class="loading-screen">
    <div class="loading-logo">CARBUZZ</div>
    <div class="loading-bar"></div>
    <div class="loading-text">Fetching car culture...</div>
  </div>
</main>

<footer>
  <div class="footer-text">CARBUZZ © 2025<br>Car Culture Aggregator</div>
  <div class="footer-sources">
    petrolicious.com · stanceworks.com · drivingline.com<br>
    roadandtrack.com · hooniverse.com · japanesenostalgicar.com
  </div>
</footer>

<script>
  // Netlify Function — fetch RSS server-side, sin CORS
  async function fetchViaFunction(url) {
    const res = await fetch(`/.netlify/functions/rss?url=${encodeURIComponent(url)}`, {
      signal: AbortSignal.timeout(10000)
    });
    if (!res.ok) throw new Error(`Function HTTP ${res.status}`);
    const text = await res.text();
    return parseRawXML(text);
  }

  const FEEDS = [
    { name: 'Petrolicious', url: 'https://petrolicious.com/blogs/articles.atom', color: '#e8ff00' },
    { name: 'StanceWorks',  url: 'https://stanceworks.com/feed/',                color: '#ff3c00' },
    { name: 'DrivingLine',  url: 'https://www.drivingline.com/feed/',             color: '#00d4ff' },
    { name: 'Road & Track', url: 'https://www.roadandtrack.com/rss/',             color: '#ffffff' },
    { name: 'Hooniverse',   url: 'https://hooniverse.com/feed/',                  color: '#ff9900' },
    { name: 'JNC',          url: 'https://japanesenostalgicar.com/feed/',         color: '#cc3333' }
  ];

  function parseRawXML(xmlStr) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlStr, 'text/xml');
    const isAtom = !!doc.querySelector('feed');
    const items = isAtom
      ? Array.from(doc.querySelectorAll('entry'))
      : Array.from(doc.querySelectorAll('item'));
    return items.slice(0, 12).map(item => {
      const get = (sel) => { const el = item.querySelector(sel); return el ? el.textContent.trim() : null; };
      const title = get('title') || '(sin titulo)';
      const link = isAtom
        ? (item.querySelector('link[rel="alternate"]')?.getAttribute('href') || item.querySelector('link')?.getAttribute('href') || get('id'))
        : (get('link') || get('guid'));
      const pubDate = new Date(get('pubDate') || get('updated') || get('published') || Date.now());
      const description = get('description') || get('content') || get('summary') || '';
      const enclosure = item.querySelector('enclosure[type^="image"]');
      const mediaThumbnail = item.querySelector('thumbnail');
      const thumbnail = enclosure?.getAttribute('url') || mediaThumbnail?.getAttribute('url') || extractImg(description) || null;
      return { title, link, pubDate, thumbnail, description };
    });
  }

  function extractImg(html) {
    if (!html) return null;
    const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
    return match ? match[1] : null;
  }

  function stripHtml(html) {
    return html.replace(/<[^>]*>/g, '').replace(/&[^;]+;/g, ' ').trim();
  }

  function timeAgo(date) {
    const diff = (Date.now() - date.getTime()) / 1000;
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  let allItems = [];
  let activeFilter = 'all';
  let feedStatus = {};

  async function fetchFeed(feed) {
    try {
      document.getElementById('status-text').textContent = `Cargando ${feed.name}...`;
      const items = await fetchViaFunction(feed.url);
      if (!items.length) throw new Error('0 items');
      feedStatus[feed.name] = { ok: true, count: items.length };
      return items.map(item => ({
        title: item.title,
        link: item.link,
        pubDate: item.pubDate,
        thumbnail: item.thumbnail || extractImg(item.description) || null,
        excerpt: stripHtml(item.description).slice(0, 140),
        source: feed.name,
        color: feed.color
      }));
    } catch (e) {
      console.warn(`[${feed.name}] fallo:`, e.message);
      feedStatus[feed.name] = { ok: false };
      return [];
    }
  }

  function renderFeatured(item) {
    return `
      <a class="featured-card" href="${item.link}" target="_blank" rel="noopener">
        <div class="featured-img">
          ${item.thumbnail
            ? `<img src="${item.thumbnail}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\'display:flex;align-items:center;justify-content:center;height:100%;font-family:Bebas Neue,sans-serif;font-size:2rem;color:#222;\'>${item.source}</div>'">`
            : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#222;letter-spacing:0.1em;">${item.source}</div>`
          }
        </div>
        <div class="featured-body">
          <div>
            <div class="featured-tag" style="color:${item.color}">DESTACADO · ${item.source}</div>
            <div class="featured-title">${item.title}</div>
            ${item.excerpt ? `<div class="featured-excerpt">${item.excerpt}...</div>` : ''}
          </div>
          <div class="card-meta">
            <span class="source-badge" style="color:${item.color}">${item.source}</span>
            <span class="card-date">${timeAgo(item.pubDate)}</span>
          </div>
        </div>
      </a>`;
  }

  function renderCard(item, idx) {
    return `
      <a class="feed-card" href="${item.link}" target="_blank" rel="noopener" style="animation-delay:${Math.min(idx * 0.05, 0.4)}s">
        <div class="card-img ${!item.thumbnail ? 'no-img' : ''}">
          ${item.thumbnail
            ? `<img src="${item.thumbnail}" alt="" loading="lazy" onerror="this.parentElement.classList.add('no-img');this.remove();this.parentElement.innerHTML='<div class=\'placeholder-logo\'>${item.source}</div>'">`
            : `<div class="placeholder-logo">${item.source}</div>`
          }
        </div>
        <div class="card-body">
          <div class="card-source" style="color:${item.color}">${item.source}</div>
          <div class="card-title">${item.title}</div>
          <div class="card-footer">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:var(--text-muted);">${timeAgo(item.pubDate)}</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:var(--border-light);">↗</span>
          </div>
        </div>
      </a>`;
  }

  function renderFeed(items) {
    const el = document.getElementById('main-content');
    if (!items.length) {
      el.innerHTML = `<div class="empty-state"><h3>SIN RESULTADOS</h3><p>No hay items para este filtro.</p></div>`;
      return;
    }
    const [featured, ...rest] = items;
    el.innerHTML = renderFeatured(featured) + `<div class="feed-grid">${rest.map((it, i) => renderCard(it, i)).join('')}</div>`;
  }

  function applyFilter(filter) {
    activeFilter = filter;
    const filtered = filter === 'all' ? allItems : allItems.filter(i => i.source === filter);
    renderFeed(filtered);
    document.getElementById('status-text').textContent =
      `${filtered.length} articulos · filtro: ${filter === 'all' ? 'todos' : filter}`;
  }

  async function loadAllFeeds() {
    const refreshBtn = document.getElementById('refresh-btn');
    refreshBtn.textContent = 'CARGANDO...';
    refreshBtn.disabled = true;
    feedStatus = {};

    const results = [];
    for (const feed of FEEDS) {
      results.push(await fetchFeed(feed));
    }

    allItems = results.flat().sort((a, b) => b.pubDate - a.pubDate);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

    const loaded = results.filter(r => r.length > 0).length;
    const failed = FEEDS.filter(f => feedStatus[f.name] && !feedStatus[f.name].ok).map(f => f.name);
    let statusMsg = `${allItems.length} articulos · ${loaded}/${FEEDS.length} feeds OK`;
    if (failed.length) statusMsg += ` · Sin respuesta: ${failed.join(', ')}`;
    document.getElementById('status-text').textContent = statusMsg;

    if (allItems.length === 0) {
      document.getElementById('main-content').innerHTML = `
        <div class="empty-state">
          <h3>SIN CONEXION</h3>
          <p>Todos los proxies fallaron. Abri la consola (F12) para ver detalles.</p>
        </div>`;
    } else {
      applyFilter(activeFilter);
    }

    refreshBtn.textContent = 'REFRESH';
    refreshBtn.disabled = false;
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter(btn.dataset.filter);
    });
  });

  loadAllFeeds();
</script>
</body>
</html>
